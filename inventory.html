<!DOCTYPE html>
<html>
<head>
  <title>GroceryTrack — Inventory</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav>
  <div class="brand">Grocery<span>Track</span></div>
  <a href="index.html">Home</a>
  <a href="login.html" id="navLogin">Login</a>
  <a href="inventory.html" class="active">Inventory</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="#" id="navLogout" onclick="logout()" class="logout-btn" style="display:none;">Logout</a>
</nav>
<div class="page">
  <h1 style="margin-bottom:20px;"> Inventory</h1>
  <div class="card">
    <h2>Add New Item</h2>
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
      <div class="field" style="flex:2; min-width:140px; margin:0;">
        <label>Item Name</label>
        <input type="text" id="itemName" placeholder="e.g. Rice, Milk"/>
      </div>
      <div class="field" style="flex:1; min-width:100px; margin:0;">
        <label>Quantity</label>
        <input type="number" id="itemQty" placeholder="e.g. 10" min="0"/>
      </div>
      <div class="field" style="flex:1; min-width:100px; margin:0;">
        <label>Price (₹)</label>
        <input type="number" id="itemPrice" placeholder="e.g. 50" min="0"/>
      </div>
      <button class="btn btn-green" onclick="addItem()" style="margin-bottom:0;">+ Add Item</button>
    </div>
    <p id="addError" class="error-text"></p>
  </div>
  <input type="text" id="searchInput" placeholder="Search by item name..." oninput="render()"/>
 <div class="card" style="padding:0; overflow:hidden;">
    <div style="padding:16px 20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
      <h2 style="margin:0;">All Items</h2>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <span id="lowBadge" class="badge badge-red" style="display:none;"></span>
        <span id="valueBadge" class="badge badge-green"></span>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Price (₹)</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyMsg" style="text-align:center; padding:40px; color:#888; display:none;">
        No items found. Add your first item above!
      </div>
    </div>
  </div>
</div>
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3> Edit Item</h3>
    <input type="hidden" id="editId"/>
    <div class="field">
      <label>Item Name</label>
      <input type="text" id="editName"/>
    </div>
    <div class="field">
      <label>Quantity</label>
      <input type="number" id="editQty" min="0"/>
    </div>
    <div class="field">
      <label>Price (₹)</label>
      <input type="number" id="editPrice" min="0"/>
    </div>
    <p id="editError" class="error-text"></p>
    <div class="modal-btns">
      <button class="btn btn-green" onclick="saveEdit()">Save</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script src="api.js"></script>
<script src="inventory.js"></script>
</body>
</html>
