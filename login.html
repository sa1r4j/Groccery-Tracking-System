<!DOCTYPE html>
<html>
<head>
  <title>GroceryTrack — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav>
  <div class="brand">Grocery<span>Track</span></div>
  <a href="index.html">Home</a>
  <a href="login.html" class="active">Login</a>
  <a href="inventory.html">Inventory</a>
  <a href="dashboard.html">Dashboard</a>
</nav>
<div class="auth-wrap">
  <div class="auth-box">
    <h2> GroceryTrack</h2>
    <div class="tab-row">
      <button id="loginTab" class="active" onclick="showTab('login')">Login</button>
      <button id="registerTab" onclick="showTab('register')">Register</button>
    </div>
    <!-- login section -->
    <div id="loginSection">
      <div id="loginAlert" class="alert"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password"/>
      </div>
      <button class="btn btn-green btn-full" onclick="handleLogin()">Login →</button>
    </div>
    <!-- register section-->
    <div id="registerSection" style="display:none;">
      <div id="registerAlert" class="alert"></div>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="regName"   placeholder="e.g. Ramesh Sharma"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password (min 6 chars)</label>
        <input type="password" id="regPassword" placeholder="Enter password"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Repeat password"/>
      </div>
      <button class="btn btn-green btn-full" onclick="handleRegister()">Create Account →</button>
    </div>
  </div>
</div>
<script src="api.js"></script>
<script src="login.js"></script>
</body>
</html>
